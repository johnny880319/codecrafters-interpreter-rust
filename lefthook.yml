# NOTE:
# These hooks assume a monorepo layout with `python-codebase/`, `go-codebase/`, `rust-codebase/`, and `typescript-codebase/` folders.
# If you rename folders, update each `root:` path below.
# If you flatten language code to repository root, remove the `root:` field entirely (setting `root: "./"` will NOT work).

pre-commit:
  parallel: true
  commands:
    # rust
    rust-lint-format:
      root: "rust-codebase/"
      glob: "**/*.rs"
      run: cargo fmt && cargo clippy --fix --allow-dirty --allow-staged && cargo clippy -- -D warnings
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    # rust
    rust-test:
      root: "rust-codebase/"
      glob: "**/*.rs"
      run: cargo test
